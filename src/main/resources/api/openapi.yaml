openapi: 3.0.3
info:
  title: Mercury API
  version: 0.0.1
  description: REST API contract for Mercury messaging services.
servers:
  - url: /
paths:
  /api/v1/campaigns:
    post:
      tags:
        - campaigns
      summary: Create a new campaign
      description: Creates a new messaging campaign and publishes messages to recipients via the specified channel.
      operationId: createCampaign
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCampaignRequest'
      responses:
        '201':
          description: Campaign created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateCampaignResponse'
        '400':
          description: Invalid request payload.
        '422':
          description: Channel type not found or disabled.
    get:
      tags:
        - campaigns
      summary: Get campaigns by application for current user
      description: Retrieves campaigns filtered by application id for the authenticated user. User id is obtained from the session token header.
      operationId: getCampaignsByApplication
      parameters:
        - name: applicationId
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: session-token
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Campaigns retrieved successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CampaignDetailResponse'
        '400':
          description: Invalid request parameters.
        '401':
          description: Invalid or missing authentication token.
        '403':
          description: Caller lacks permission to view these campaigns.

  /api/v1/campaigns/{id}:
    get:
      tags:
        - campaigns
      summary: Get campaign by ID
      description: Retrieves the full details of a campaign identified by its UUID.
      operationId: getCampaignById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Campaign found and returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampaignDetailResponse'
        '400':
          description: Invalid UUID format supplied for id.
        '401':
          description: Invalid or missing authentication token.
        '403':
          description: Caller lacks permission to view this campaign.
        '404':
          description: Campaign with the given id does not exist.
        '500':
          description: Unexpected internal error.

  /api/v1/mail:
    post:
      tags:
        - mail
      summary: Send an email
      description: Send an email.
      operationId: sendEmail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendEmailRequest'
      responses:
        '200':
          description: Email sent successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendEmailResponse'

  /api/v1/verification-code:
    post:
      tags:
        - verification-code
      summary: Send verification code to user
      description: Send verification code to user.
      operationId: sendVerificationCode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerificationCodeRequest'
      responses:
        '200':
          description: Verification code sent successfully.
        '400':
          description: Invalid phone number.
        '500':
          description: Internal server error.

  /api/v1/verification-code/latest-status:
    get:
      tags:
        - verification-code
      summary: Get latest verification status
      description: Get the is_verified status of the latest verification code for a user.
      operationId: getLatestIsVerifiedStatus
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Status retrieved successfully.
          content:
            application/json:
              schema:
                type: boolean
        '404':
          description: No verification code found for user.
        '500':
          description: Internal server error.

  /api/v1/channel-types:
    get:
      tags:
        - channel-types
      summary: Get all channel types
      operationId: getAllChannelTypes
      responses:
        '200':
          description: Channel types retrieved successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ChannelTypeTO'
    post:
      tags:
        - channel-types
      summary: Create new channel type
      operationId: createChannelType
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChannelTypeTO'
      responses:
        '200':
          description: Channel type created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelTypeTO'

  /api/v1/channel-types/enabled:
    get:
      tags:
        - channel-types
      summary: Get enabled channel types only
      operationId: getEnabledChannelTypes
      responses:
        '200':
          description: Enabled channel types retrieved successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ChannelTypeTO'

  /api/v1/channel-types/code/{code}:
    get:
      tags:
        - channel-types
      summary: Get channel type by code
      operationId: getChannelTypeByCode
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Channel type retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelTypeTO'

  /api/v1/channel-types/{id}:
    get:
      tags:
        - channel-types
      summary: Get channel type by ID
      operationId: getChannelTypeById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Channel type retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelTypeTO'
    put:
      tags:
        - channel-types
      summary: Update channel type
      operationId: updateChannelType
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChannelTypeTO'
      responses:
        '200':
          description: Channel type updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelTypeTO'

  /api/v1/channel-types/{id}/toggle:
    patch:
      tags:
        - channel-types
      summary: Enable or disable channel type
      operationId: toggleChannelType
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: enabled
          in: query
          required: true
          schema:
            type: boolean
      responses:
        '204':
          description: Channel type toggled successfully.

components:
  schemas:
    CreateCampaignRequest:
      type: object
      required:
        - name
        - channelTypeCode
        - templateId
        - userId
        - recipients
        - status
        - applicationId
      properties:
        name:
          type: string
        channelTypeCode:
          type: string
        templateId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        recipients:
          type: array
          items:
            $ref: '#/components/schemas/RecipientTO'
        templateParams:
          type: object
          additionalProperties: true
        scheduledAt:
          type: string
          format: date-time
        status:
          type: string
        applicationId:
          type: string
          format: uuid
      example:
        name: "Welcome Campaign"
        channelTypeCode: "EMAIL"
        templateId: "00000000-0000-0000-0000-000000000001"
        userId: "00000000-0000-0000-0000-000000000002"
        recipients:
          - identifier: "user@example.com"
            name: "Jane Doe"
        templateParams:
          firstName: "Jane"
        scheduledAt: "2026-03-20T10:00:00Z"
        status: "SCHEDULED"
        applicationId: "00000000-0000-0000-0000-000000000003"

    CreateCampaignResponse:
      type: object
      properties:
        campaignId:
          type: string
          format: uuid
        name:
          type: string
        status:
          type: string
        totalRecipients:
          type: integer
          format: int32
        createdAt:
          type: string
          format: date-time
        scheduledAt:
          type: string
          format: date-time
          nullable: true

    RecipientTO:
      type: object
      required:
        - identifier
      properties:
        identifier:
          type: string
          description: Recipient identifier such as email, phone, or chat ID.
        name:
          type: string
          nullable: true
        customParams:
          type: object
          additionalProperties: true

    SendEmailRequest:
      type: object
      required:
        - templateDefinedId
        - userId
        - from
        - to
        - cc
        - subject
        - body
      properties:
        templateDefinedId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        from:
          type: string
        to:
          type: array
          items:
            $ref: '#/components/schemas/EmailContact'
        cc:
          type: array
          items:
            $ref: '#/components/schemas/EmailContact'
        subject:
          type: string
        body:
          type: string
        sendDate:
          type: string
          format: date-time
        params:
          type: object
          additionalProperties: true
      example:
        templateDefinedId: "11111111-1111-1111-1111-111111111111"
        userId: "22222222-2222-2222-2222-222222222222"
        from: "no-reply@example.com"
        to:
          - email: "recipient@example.com"
            name: "Recipient"
        cc: []
        subject: "Welcome to Mercury"
        body: "Hello {{firstName}}, welcome!"
        sendDate: "2026-03-13T12:00:00Z"
        params:
          firstName: "John"

    SendEmailResponse:
      type: object
      required:
        - id
        - status
        - message
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
        message:
          type: string

    EmailContact:
      type: object
      required:
        - email
        - name
      properties:
        email:
          type: string
          format: email
        name:
          type: string
        alias:
          type: string
          nullable: true

    VerificationCodeRequest:
      type: object
      required:
        - applicationId
        - userId
        - code
      properties:
        applicationId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        code:
          type: string
      example:
        applicationId: "33333333-3333-3333-3333-333333333333"
        userId: "44444444-4444-4444-4444-444444444444"
        code: "123456"

    ChannelTypeTO:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        description:
          type: string
        icon:
          type: string
        enabled:
          type: boolean
        implementationClass:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        active:
          type: boolean
      example:
        id: "55555555-5555-5555-5555-555555555555"
        code: "EMAIL"
        name: "Email"
        description: "Standard email channel"
        icon: "mailto"
        enabled: true
        implementationClass: "com.prx.mercury.channel.EmailChannel"
        createdAt: "2026-01-01T00:00:00Z"
        updatedAt: "2026-01-02T00:00:00Z"
        active: true

    CampaignDetailResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        channelType:
          type: string
        templateId:
          type: string
          format: uuid
        status:
          type: string
        totalRecipients:
          type: integer
          format: int32
        scheduledAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties: true

